<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medibot – AI Medical Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="menu-btn" id="menu-toggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New chat</span>
                </button>
            </div>

            <div class="sidebar-content">
                <div class="sidebar-section">
                    <h3>Quick Actions</h3>
                    <button class="sidebar-item" onclick="sendQuickMessage('doctor near me')">
                        <span class="icon">📍</span>
                        <span>Find Doctor</span>
                    </button>
                    <button class="sidebar-item" onclick="sendQuickMessage('hospital near me')">
                        <span class="icon">🏨</span>
                        <span>Find Hospital</span>
                    </button>
                    <button class="sidebar-item" onclick="sendQuickMessage('pharmacy near me')">
                        <span class="icon">💊</span>
                        <span>Find Pharmacy</span>
                    </button>
                    <button class="sidebar-item" onclick="sendQuickMessage('dentist near me')">
                        <span class="icon">🦷</span>
                        <span>Find Dentist</span>
                    </button>
                </div>

                <div class="sidebar-section">
                    <h3>Recent</h3>
                    <div id="recent-chats" class="recent-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-item" id="clear-history-btn">
                    <span class="icon">🗑️</span>
                    <span>Clear history</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobile-menu-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="logo">
                        <span class="logo-icon">🩺</span>
                        <span class="logo-text">Medibot</span>
                    </div>
                </div>
                
                <!-- FIXED: Updated header-right with user info and logout -->
                <div class="header-right">
                    <span class="user-badge" id="user-badge">
                        <span class="user-avatar" id="user-avatar">U</span>
                        <span class="user-name" id="user-name">User</span>
                    </span>
                    <button class="logout-btn" id="logout-btn" title="Logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Container -->
            <div class="chat-wrapper">
                <div class="chat-container" id="chat-container">
                    <!-- Welcome Screen (shown when no messages) -->
                    <div class="welcome-screen" id="welcome-screen">
                        <div class="welcome-icon">🩺</div>
                        <h1>Hello, I'm Medibot</h1>
                        <p>Your AI-powered health information assistant</p>
                        
                        <div class="suggestion-cards">
                            <button class="suggestion-card" onclick="sendQuickMessage('What are common symptoms of cold vs flu?')">
                                <span class="card-icon">🤒</span>
                                <span class="card-text">Cold vs Flu symptoms</span>
                            </button>
                            <button class="suggestion-card" onclick="sendQuickMessage('How can I improve my sleep quality?')">
                                <span class="card-icon">😴</span>
                                <span class="card-text">Improve sleep quality</span>
                            </button>
                            <button class="suggestion-card" onclick="sendQuickMessage('What are signs of dehydration?')">
                                <span class="card-icon">💧</span>
                                <span class="card-text">Signs of dehydration</span>
                            </button>
                            <button class="suggestion-card" onclick="sendQuickMessage('doctor near me')">
                                <span class="card-icon">📍</span>
                                <span class="card-text">Find doctor near me</span>
                            </button>
                        </div>
                    </div>

                    <!-- Chat Messages -->
                    <div class="chat-messages" id="chat-messages"></div>
                </div>

                <!-- Input Area -->
                <div class="input-wrapper">
                    <div class="input-container">
                        <textarea 
                            id="user-input" 
                            class="chat-input" 
                            placeholder="Ask Medibot anything about health..."
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button class="send-btn" id="send-btn" type="button">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="disclaimer">
                        Medibot provides general health information only. Always consult a healthcare professional for medical advice.
                    </p>
                </div>
            </div>
        </main>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
